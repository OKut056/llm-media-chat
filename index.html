<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Agent Chat</title>
    <link rel="stylesheet" type="text/css" href="./style.css">
</head>
<body>

    <!-- 左侧面板 -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <button id="new-chat-btn">+ 新建对话</button>
        </div>
        <div class="sidebar-content" id="history-list">
            <!-- 历史条目由 JS 动态生成 -->
        </div>
    </aside>

    <!-- 右侧聊天面板 -->
    <main id="main-content">
        <div class="header-bar">
            <button class="menu-btn" id="menu-toggle">☰</button>
            <span>Agent 助理</span>
        </div>

        <div id="chat-window">
            <div class="message bot-msg">
                你好！我是你的智能助理。你可以直接和我聊天，也可以发送指令并附带图片让我进行视觉分析或远程生图。
            </div>
        </div>

        <div id="input-container">
            <!-- 图片预览 -->
            <div id="image-preview-container">
                <button id="remove-img-btn">×</button>
                <img id="image-preview" src="" alt="预览">
            </div>

            <div class="input-box">
                <!-- 隐藏的图片上传控件 -->
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                
                <button class="action-btn" id="upload-btn" title="上传图片">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 13H5l3-4.14 1.5 1.87L13 10.59 18 16h-8z"/>
                    </svg>
                </button>

                <textarea id="message-input" rows="1" placeholder="输入消息或生成指令..."></textarea>

                <button class="action-btn send-btn disabled" id="send-btn" title="发送">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        // 配置后端接口地址
        // 优化代码：不再把内网 IP 完全写死，改为动态获取当前宿主机域名以防止环境切换后连接失效
        const DEFAULT_IP = "192.168.*.*";
        const currentHost = window.location.hostname || DEFAULT_IP;
        // 配置后端接口地址
        const API_BASE_URL = `http://${currentHost}:8000`;

        // --- 历史记录配置 ---
        const HISTORY_KEY = 'chat_agent_history';
        const MAX_HISTORY = 50; // 最多存储50条

        let currentChatId = Date.now().toString(); // 当前对话ID
        const CHATS_KEY = 'chat_agent_sessions'; // 更改键名以支持多会话

        // DOM 元素获取
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const sendBtn = document.getElementById('send-btn');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImgBtn = document.getElementById('remove-img-btn');
        const historyList = document.getElementById('history-list');
        const newChatBtn = document.getElementById('new-chat-btn');

        let selectedFile = null;

        // 移动端侧边栏切换
        menuToggle.addEventListener('click', (e) => {
            // 禁止事件冒泡（防止点击按钮触发其他可能的隐藏逻辑）
            e.stopPropagation();

            if (window.innerWidth <= 768) {
                // 手机端：切换 'open' 类来实现平滑侧滑
                sidebar.classList.toggle('open');
            } else {
                // PC端：切换 'collapsed' 类来实现宽度收缩
                sidebar.classList.toggle('collapsed');
            }
        });

        // 自动调整输入框高度并控制发送按钮状态
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            checkSendReady();
        });

        // 检查是否可以发送（只要有文本或有图片就激活发送按钮）
        function checkSendReady() {
            if (messageInput.value.trim() !== '' || selectedFile) {
                sendBtn.classList.remove('disabled');
            } else {
                sendBtn.classList.add('disabled');
            }
        }

        // 触发文件选择
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择后的处理（预览）
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                selectedFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreviewContainer.style.display = 'block';
                    checkSendReady();
                }
                reader.readAsDataURL(selectedFile);
            }
        });

        // 移除图片
        removeImgBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            imagePreviewContainer.style.display = 'none';
            imagePreview.src = '';
            checkSendReady();
        });

        // 添加消息到对话窗
        function appendMessage(content, type, imageUrl = null, isHistory = false, msgId = null) {

            // 1. 如果是新发送的消息，生成一个随机唯一标识
            if (!msgId) {
                msgId = Date.now().toString() + Math.random().toString(36).substring(2, 7);
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            
            // 因为后端的 Agent 代码已将 Markdown 图片语法处理成 HTML（见代码段），
            // 对于 bot 输出，为了呈现 <img src='...'> 格式，这里使用 innerHTML。
            // 真实生产环境需使用 DOMPurify 防范 XSS，此处为本地可信服务直接使用处理。
            let htmlContent = content.replace(/\n/g, '<br>');
            
            // 如果发送作为用户的消息，且附带本地图片预览
            if (type === 'user-msg' && imageUrl) {
                htmlContent += `<br><img src="${imageUrl}" alt="user_image">`;
            }
            
            msgDiv.innerHTML = htmlContent;

            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.style.maxWidth = '100%';
                msgDiv.appendChild(img);
            }

            // 2. 创建悬浮及删除按键逻辑
            const delBtn = document.createElement('div');
            delBtn.className = 'msg-delete-btn';
            delBtn.innerText = '删除';
            
            let isConfirming = false; // 二次确认状态控制

            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            delBtn.onclick = (e) => {
                e.stopPropagation(); // 阻止其他事件
                
                if (!isConfirming) {
                    // == 第一次点击：进入红字确认状态 ==
                    isConfirming = true;
                    delBtn.innerText = '确认删除？';
                    delBtn.classList.add('confirm-state');

                    // 交互优化：如果鼠标移出了这条消息，取消确认状态，变回普通"删除"
                    msgDiv.onmouseleave = () => {
                        isConfirming = false;
                        delBtn.innerText = '删除';
                        delBtn.classList.remove('confirm-state');
                        msgDiv.onmouseleave = null; // 清除此事件监听
                    };
                } else {
                    // == 第二次点击：确属删除操作 ==
                    msgDiv.remove(); // 1. 先从右边画面删除
                    deleteMsgFromLocal(currentChatId, msgId, content); // 2. 再执行缓存清除
                }
            };

            msgDiv.appendChild(delBtn);

            // --- 如果不是历史回显，则存入本地 ---
            // 3. 将消息及唯一 msgId 保存至 localStorage (只有非历史发送时才执行)
            if (!isHistory) {
                saveToLocal({ msgId, content, type, imageUrl, timestamp: Date.now() });
            }
        }

        // 创建打字等待动画
        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message bot-msg typing';
            div.id = 'typing-indicator';
            div.innerHTML = `
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        // 发送逻辑
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && !selectedFile) return;

            // === 锁定发送时刻的对话 ID ===
            const sendingChatId = currentChatId;

            // 1. 将用户消息在UI渲染
            const localImgUrl = selectedFile ? URL.createObjectURL(selectedFile) : null;
            appendMessage(text, 'user-msg', localImgUrl);
            
            // 2. 清理输入框
            messageInput.value = '';
            messageInput.style.height = 'auto';
            const fileToSend = selectedFile; // 缓存一下
            
            // 移除本地预览
            selectedFile = null;
            fileInput.value = '';
            imagePreviewContainer.style.display = 'none';
            checkSendReady();

            showTypingIndicator();

            // 3. 构建 FormData 上传，适配后端 /chat 接口
            const formData = new FormData();
            formData.append('command', text);
            if (fileToSend) {
                // name 需要与后端函数参数对应 (image_file: UploadFile = File(None))
                formData.append('image_file', fileToSend); 
            }

            try {
                // 请求后端 Agent
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    body: formData,
                    // fetch 使用 FormData 时切勿手动设置 Content-Type，
                    // 浏览器会自动设置并加上 boundaries 值。
                });
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                let replyContent = result.message || "请求成功，但未返回内容。";
                    
                // 如果后端返回的字典独立带了预览链接，组装到 message 中
                if(result.preview_url && !replyContent.includes("<img")) {
                     replyContent += `<br><br>✅ 生成预览：<br><img src="${result.preview_url}" width="500">`;
                }
                
                // === 无论是否切换，都存入 sendingChatId 对应的缓存 ===
                saveToLocal({ 
                    content: replyContent || "生成失败", 
                    type: 'bot-msg',
                    msgId: Date.now().toString() + 'b'
                }, sendingChatId); // 传入锁定的 ID

                // === 只在用户仍停留在原对话时才更新 UI ===
                if (currentChatId === sendingChatId) {
                    removeTypingIndicator();
                    appendMessage(
                        replyContent || "生成失败",
                        'bot-msg',
                        null,
                        true,
                        Date.now().toString() + 'b'
                    );
                } else {
                    console.log(`[INFO] 回复已存入对话 ${sendingChatId}，用户已切换至 ${currentChatId}，不刷新界面`);
                }

                //appendMessage(replyContent, 'bot-msg');

            } catch (error) {
                console.error("请求错误：", error);
                removeTypingIndicator();
                appendMessage("请求失败，请检查后端服务是否正在运行以及跨域设置(CORS)。", 'bot-msg');
            }
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            history.forEach(item => {
                // 调用原有的 appendMessage 函数渲染，注意添加一个参数防止重复触发保存
                appendMessage(item.content, item.type, item.imageUrl, true);
            });
        }

        // 1. 初始化/加载历史列表显示在侧边栏
        function renderHistoryList() {
            const historyList = document.getElementById('history-list');
            const chats = JSON.parse(localStorage.getItem(CHATS_KEY) || '{}');
            historyList.innerHTML = '';

            Object.keys(chats).sort().reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = 'history-item';
                if (id === currentChatId) item.classList.add('active');

                // 文字内容部分
                const messages = chats[id];
                const previewText = messages.length > 0 ? messages[0].content.substring(0, 15) : "新对话";
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'history-title';
                titleSpan.innerText = previewText;
                
                // 删除按钮部分
                const delBtn = document.createElement('span');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '&times;'; // 显示一个 X 符号
                delBtn.title = "删除对话";
                
                // 阻止冒泡，点击删除时不会触发渲染对话
                delBtn.onclick = (e) => {
                    e.stopPropagation(); 
                    deleteChat(id);
                };

                item.onclick = () => switchChat(id);
                
                item.appendChild(titleSpan);
                item.appendChild(delBtn);
                historyList.appendChild(item);
            });
        }

        // 2. 删除对话逻辑
        function deleteChat(id) {
            // 弹出确认弹窗
            if (!confirm("确定要删除这段对话记录吗？此操作不可撤销。")) {
                return;
            }

            let chats = JSON.parse(localStorage.getItem(CHATS_KEY) || '{}');
            
            // 从对象中删除对应 ID
            if (chats[id]) {
                delete chats[id];
                localStorage.setItem(CHATS_KEY, JSON.stringify(chats));
            }

            // 如果删除的是当前正在查看的对话，则清空窗口并开启新对话
            if (id === currentChatId) {
                currentChatId = Date.now().toString();
                document.getElementById('chat-window').innerHTML = '';
            }

            renderHistoryList(); // 重新刷新左侧列表
        }

        // 2. 切换对话
        function switchChat(id) {
            currentChatId = id;
            const chatWindow = document.getElementById('chat-window');
            chatWindow.innerHTML = ''; // 清空当前屏幕
            
            const chats = JSON.parse(localStorage.getItem(CHATS_KEY) || '{}');
            const messages = chats[id] || [];
            
            // 重新渲染该记录下的所有消息
            messages.forEach(msg => {
                appendMessage(msg.content, msg.type, msg.imageUrl, true, msg.msgId);
            });

            renderHistoryList();
        }

        // --- 本地存储持久化函数 ---
        // 3. 修改原有的保存函数
        function saveToLocal(msgObj, targetId = null) {
            // 如果没传 targetId，默认使用当前的 currentChatId
            const chatId = targetId || currentChatId;

            let chats = JSON.parse(localStorage.getItem(CHATS_KEY) || '{}');
            if (!chats[chatId]) {
                chats[chatId] = [];
            }
            
            chats[chatId].push(msgObj);
            localStorage.setItem(CHATS_KEY, JSON.stringify(chats));
            
            // 如果是首条消息，刷新列表以更新标题
            if (chats[chatId].length === 1) {
                renderHistoryList();
            }
        }

        // 从本地缓存删除单条聊天记录
        function deleteMsgFromLocal(chatId, msgId, contentToFallback) {
            let chats = JSON.parse(localStorage.getItem(CHATS_KEY) || '{}');
            if (chats[chatId]) {
                // 根据唯一的 msgId 查找并删除（容错处理：若为旧记录无msgId，则匹配内容）
                const index = chats[chatId].findIndex(msg => 
                    (msg.msgId && msg.msgId === msgId) || (!msg.msgId && msg.content === contentToFallback)
                );
                
                if (index !== -1) {
                    chats[chatId].splice(index, 1);
                    
                    // 如果某对话的所有消息都被删空了，将其彻底移除
                    if (chats[chatId].length === 0) {
                        delete chats[chatId];
                        if (currentChatId === chatId) {
                            currentChatId = Date.now().toString(); // 当前置空后生成新ID
                        }
                    }
                    
                    localStorage.setItem(CHATS_KEY, JSON.stringify(chats));
                    renderHistoryList(); // 同步刷新侧边栏（如果它刚好是最新一条被删了）
                }
            }
        }

        // 4. 新建对话按钮事件
        newChatBtn.addEventListener('click', () => {
            currentChatId = Date.now().toString(); // 生成新ID
            document.getElementById('chat-window').innerHTML = ''; // 清空窗口
            renderHistoryList();
        });

        // 5. 页面初始化
        window.addEventListener('DOMContentLoaded', () => {
            const chats = JSON.parse(localStorage.getItem(CHATS_KEY) || '{}');
            const ids = Object.keys(chats);
            
            if (ids.length > 0) {
                // 如果有历史，加载最近一个
                switchChat(ids.sort().reverse()[0]);
            } else {
                // 否则渲染空列表
                renderHistoryList();
            }
        });

        // 回车发送支持（Shift+Enter 换行）
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.classList.contains('disabled')) {
                    sendMessage();
                }
            }
        });

        sendBtn.addEventListener('click', () => {
            if (!sendBtn.classList.contains('disabled')) {
                sendMessage();
            }
        });

        // --- 页面加载时自动恢复记录 ---
        window.addEventListener('DOMContentLoaded', () => {
            loadHistory();
        });
    </script>
</body>
</html>
